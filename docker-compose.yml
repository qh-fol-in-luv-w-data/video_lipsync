services:

  lipsync:
    build:
      context: .
      dockerfile: Dockerfile
    image: ats-lipsync:latest
    container_name: ats_lipsync

    volumes:
      - ./inputs:/app/inputs        # bỏ ảnh vào inputs/images/, audio vào inputs/audios/
      - ./outputs:/app/outputs      # video xuất ra đây
      - latentsync_repo:/app/LatentSync   # cache repo + checkpoint (~4-5GB)

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/LatentSync/.hf_cache

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Mặc định: batch toàn bộ inputs/
    command: ["--batch", "--steps", "20", "--guidance", "2.0"]
    restart: "no"

volumes:
  latentsync_repo:
    name: ats_latentsync_repo
